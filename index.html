<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bütçe">
<meta name="theme-color" content="#090909">
<title>Dinamik Bütçe Takip</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090909;--bg2:#121212;--bg3:#1a1a1a;--bg4:#222;
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);
  --t:#edeae4;--t2:#8a8480;--t3:#50504a;
  --R:#f04438;--R2:#ff7b72;--rBg:rgba(240,68,56,0.1);
  --A:#f5a623;--A2:#ffd166;--aBg:rgba(245,166,35,0.1);
  --G:#22c55e;--G2:#4ade80;--gBg:rgba(34,197,94,0.1);
  --B:#3b82f6;--B2:#60a5fa;--blBg:rgba(59,130,246,0.1);
  --P:#a78bfa;--pBg:rgba(167,139,250,0.1);
  --r:12px;--rs:7px;--tab:60px;
  --ff:'Barlow',sans-serif;--fm:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--ff);overflow:hidden}

/* AUTH */
#auth{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px}
#auth.hide{display:none}
.auth-box{width:100%;max-width:360px}
.auth-brand{font-family:var(--fm);font-size:11px;color:var(--A);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.auth-h{font-size:30px;font-weight:700;margin-bottom:4px}
.auth-s{font-size:13px;color:var(--t2);margin-bottom:28px}
.ig{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.ig label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.09em}
input,select{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);color:var(--t);font-family:var(--ff);font-size:15px;padding:12px 14px;width:100%;outline:none;-webkit-appearance:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--A)}
select option{background:var(--bg3)}
.bf{width:100%;padding:14px;border-radius:var(--rs);border:none;font-family:var(--ff);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px}
.bf.pri{background:var(--A);color:#090909}
.bf.sec{background:transparent;border:1px solid var(--b2);color:var(--t)}
.amsg{font-size:12px;color:var(--R2);text-align:center;margin-top:6px;min-height:18px}

/* LAYOUT */
#app{display:none;flex-direction:column;height:100vh;height:calc(100vh - env(safe-area-inset-top));padding-top:env(safe-area-inset-top);max-width:700px;margin:0 auto}
#app.show{display:flex}
#scr{flex:1;overflow-y:auto;scrollbar-width:none}
#scr::-webkit-scrollbar{display:none}

/* TABBAR */
#tbar{height:calc(var(--tab) + env(safe-area-inset-bottom));background:rgba(9,9,9,0.97);border-top:1px solid var(--b);display:flex;align-items:flex-start;padding:8px 2px 0;backdrop-filter:blur(24px);flex-shrink:0}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border:none;background:none;color:var(--t3);cursor:pointer;border-radius:var(--rs);transition:color .12s}
.tb svg{width:20px;height:20px;stroke-width:1.7}
.tb span{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.tb.on{color:var(--A)}

/* FAB */
#fab{position:fixed;bottom:calc(var(--tab) + env(safe-area-inset-bottom) + 14px);right:max(14px,calc(50% - 350px + 14px));width:50px;height:50px;border-radius:50%;background:var(--A);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 20px rgba(245,166,35,.35)}
#fab:active{transform:scale(.92)}
#fab svg{width:22px;height:22px;stroke:#090909;stroke-width:2.5}

/* PAGES */
.pg{display:none;padding:14px 14px 120px;animation:fu .18s ease}
.pg.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* SYNC */
#sd{position:fixed;top:calc(env(safe-area-inset-top)+8px);right:14px;width:7px;height:7px;border-radius:50%;background:var(--t3);z-index:200}
#sd.ok{background:var(--G)}
#sd.sy{background:var(--A);animation:bl .6s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}

/* AY NAV */
.mnav{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.mnav button{background:var(--bg3);border:1px solid var(--b);border-radius:var(--rs);color:var(--t);padding:8px 14px;cursor:pointer;font-size:18px;line-height:1;flex-shrink:0}
.mname{flex:1;text-align:center;font-size:17px;font-weight:700;font-family:var(--fm);color:var(--A)}

/* ANA TABLO ROWS */
.at-section{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin:14px 0 6px 2px}
/* Gelir row: ad | limit(input) | oran(input) | hesaplanan */
.at-row{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);margin-bottom:5px;overflow:hidden}
.at-row.gelir-row{border-left:3px solid var(--G)}
.at-row.gider-row{border-left:3px solid var(--R)}
.at-main{display:grid;grid-template-columns:1fr 90px 70px 100px;gap:0}
.at-cell{padding:10px 10px;border-right:1px solid var(--b);display:flex;flex-direction:column;justify-content:center}
.at-cell:last-child{border-right:none}
.at-ad{font-size:13px;font-weight:600}
.at-sub{font-size:10px;color:var(--t3);margin-top:2px}
.at-inp{font-family:var(--fm);font-size:13px;padding:0;border:none;background:transparent;color:var(--t);width:100%;text-align:right}
.at-inp:focus{outline:none;color:var(--A)}
.at-val{font-family:var(--fm);font-size:13px;font-weight:700;text-align:right}
.at-val.p{color:var(--G2)}.at-val.n{color:var(--R2)}.at-val.a{color:var(--A)}

/* ÖZET */
.ozet{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:14px;margin-top:12px}
.oz-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b)}
.oz-row:last-child{border-bottom:none;padding-top:10px;margin-top:2px;border-top:1px solid var(--b2)}
.oz-lbl{font-size:13px;color:var(--t2)}
.oz-val{font-family:var(--fm);font-size:14px;font-weight:600}
.oz-inp{font-family:var(--fm);font-size:13px;padding:5px 8px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--bg3);color:var(--t);width:140px;text-align:right}

/* TABLO HEADER */
.at-hdr{display:grid;grid-template-columns:1fr 90px 70px 100px;gap:0;margin-bottom:4px;padding:0 2px}
.at-hdr div{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;text-align:right;padding:0 10px}
.at-hdr div:first-child{text-align:left}

/* DÜZENLİ GİDERLER */
.dg-wrap{overflow-x:auto;margin-bottom:12px}
.dg-tbl{border-collapse:collapse;font-size:12px;white-space:nowrap}
.dg-tbl th{padding:7px 10px;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--b);background:var(--bg3);text-align:right}
.dg-tbl th:first-child{text-align:left;position:sticky;left:0;min-width:140px;z-index:1}
.dg-tbl td{padding:6px 8px;border-bottom:1px solid var(--b);vertical-align:middle}
.dg-tbl td:first-child{position:sticky;left:0;background:var(--bg2);font-weight:600;font-size:12px;z-index:1;padding-right:12px}
.dg-inp{font-family:var(--fm);font-size:12px;padding:4px 7px;border-radius:5px;border:1px solid var(--b);background:var(--bg3);color:var(--t);width:85px;text-align:right}
.dg-inp:focus{border-color:var(--A);outline:none}
.dg-cur{background:rgba(245,166,35,0.05)!important}
.dg-top{font-family:var(--fm);font-size:12px;font-weight:700;text-align:right;padding:7px 10px;background:var(--bg3)}
.dg-top.cur{color:var(--A)}
.dg-del{background:none;border:none;color:var(--t3);cursor:pointer;padding:2px 5px;font-size:14px}

/* KART PANELI */
.kart-panel{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:14px;margin-bottom:8px}
.kp-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.kp-ad{font-size:15px;font-weight:700}
.kp-kesim{font-size:11px;color:var(--t3);margin-top:2px}
.kp-kalan{text-align:right}
.kp-kalan-val{font-family:var(--fm);font-size:20px;font-weight:700}
.kp-kalan-lbl{font-size:11px;color:var(--t3)}
.kp-pb{height:6px;background:rgba(255,255,255,.07);border-radius:3px;margin-bottom:10px;overflow:hidden}
.kp-pbf{height:100%;border-radius:3px;transition:width .4s}
.kp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.kps{background:var(--bg3);border-radius:8px;padding:8px 10px}
.kps-l{font-size:10px;color:var(--t3);margin-bottom:3px}
.kps-v{font-family:var(--fm);font-size:13px;font-weight:600}
.kp-items{border-top:1px solid var(--b);padding-top:10px}
.kp-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--b)}
.kp-item:last-child{border-bottom:none}
.kp-item-ad{font-size:12px;font-weight:600}
.kp-item-sub{font-size:10px;color:var(--t3);margin-top:1px}
.kp-item-val{font-family:var(--fm);font-size:12px;color:var(--R2);font-weight:600}

/* QUICK MODAL */
#qm{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center}
#qm.open{display:flex}
.qs{background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--b2);border-bottom:none;padding:20px 18px calc(28px + env(safe-area-inset-bottom));width:100%;max-width:700px;animation:su .2s ease;max-height:88vh;overflow-y:auto}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.qh{width:30px;height:3px;background:var(--b2);border-radius:2px;margin:0 auto 16px}
.type-sw{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:var(--bg3);border-radius:var(--rs);padding:3px;margin-bottom:14px}
.tsw{padding:10px;text-align:center;border:none;background:none;border-radius:5px;font-family:var(--ff);font-size:14px;font-weight:600;cursor:pointer;color:var(--t3)}
.tsw.g{background:var(--gBg);color:var(--G2)}
.tsw.r{background:var(--rBg);color:var(--R2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.save-btn{width:100%;padding:14px;border-radius:var(--rs);border:none;background:var(--A);color:#090909;font-family:var(--ff);font-size:15px;font-weight:700;cursor:pointer}
.qmsg{font-size:12px;color:var(--R2);margin-top:8px;min-height:16px}
.ekstre-note{font-size:11px;color:var(--A);margin-top:6px;padding:8px 10px;background:var(--aBg);border-radius:var(--rs)}

/* İŞLEM SATIRI */
.txn-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);margin-bottom:5px}
.txn-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.txn-m{flex:1;min-width:0}
.txn-n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-s{font-size:11px;color:var(--t3);margin-top:1px}
.txn-a{font-family:var(--fm);font-size:14px;font-weight:600;white-space:nowrap}
.txn-del{background:none;border:none;color:var(--t3);cursor:pointer;padding:6px;border-radius:6px}
.txn-del:active{color:var(--R2)}

/* GENEL */
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.pt{font-size:20px;font-weight:700}
.bs{padding:7px 12px;border-radius:var(--rs);border:1px solid var(--b2);background:none;color:var(--t);font-family:var(--ff);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.bs.a{border-color:var(--A);color:var(--A);background:var(--aBg)}
.bs.del{border-color:transparent;color:var(--R2)}
.empty{text-align:center;padding:28px;color:var(--t3);font-size:13px}
.sum-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px}
.sc-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.sc-v{font-family:var(--fm);font-size:18px;font-weight:700}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700}
.bg{background:var(--gBg);color:var(--G2)}.br{background:var(--rBg);color:var(--R2)}.ba{background:var(--aBg);color:var(--A)}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-brand">Dinamik Bütçe</div>
    <div class="auth-h">Giriş Yap</div>
    <div class="auth-s">Tüm cihazlarınızda anlık senkronize</div>
    <div class="ig"><label>E-posta</label><input type="email" id="ae" inputmode="email" autocomplete="email" placeholder="ornek@mail.com"></div>
    <div class="ig"><label>Şifre</label><input type="password" id="ap" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="bf pri" onclick="doLogin()">Giriş Yap</button>
    <button class="bf sec" onclick="doReg()">Hesap Oluştur</button>
    <div class="amsg" id="amsg"></div>
  </div>
</div>

<div id="sd"></div>

<div id="app">
  <div id="scr">
    <div id="p1" class="pg on"></div>
    <div id="p2" class="pg"></div>
    <div id="p3" class="pg"></div>
    <div id="p4" class="pg"></div>
  </div>
  <button id="fab" onclick="openQ()">
    <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <nav id="tbar">
    <button class="tb on" onclick="gT(1,this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
      <span>Ana Tablo</span>
    </button>
    <button class="tb" onclick="gT(2,this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
      <span>Düzenli</span>
    </button>
    <button class="tb" onclick="gT(3,this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span>Kartlar</span>
    </button>
    <button class="tb" onclick="gT(4,this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>İşlemler</span>
    </button>
  </nav>
</div>

<!-- QUICK MODAL -->
<div id="qm" onclick="closeQ(event)">
  <div class="qs">
    <div class="qh"></div>
    <div class="type-sw">
      <button class="tsw g" id="qg" onclick="setQT('g')">+ Gelir</button>
      <button class="tsw" id="qr" onclick="setQT('r')">− Gider</button>
    </div>
    <div class="frow">
      <div class="fg" style="margin:0"><label>Tarih</label><input type="date" id="qd"></div>
      <div class="fg" style="margin:0"><label>Tutar (₺)</label><input type="number" id="qt" placeholder="0" inputmode="decimal"></div>
    </div>
    <div class="fg"><label>Kart / Kalem</label><select id="qk" onchange="showEkstreNote()"></select></div>
    <div class="ekstre-note" id="en" style="display:none"></div>
    <div class="fg"><label>Kategori</label><select id="qc"></select></div>
    <div class="fg"><label>Not</label><input type="text" id="qn" placeholder="Opsiyonel..."></div>
    <button class="save-btn" onclick="saveQ()">Kaydet</button>
    <div class="qmsg" id="qmsg"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getDatabase,ref,set,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app=initializeApp({apiKey:"AIzaSyAq6IUR72qKIcueiU7m-teS_iON80yL9TI",authDomain:"finans-takip-7b6eb.firebaseapp.com",databaseURL:"https://finans-takip-7b6eb-default-rtdb.firebaseio.com",projectId:"finans-takip-7b6eb",storageBucket:"finans-takip-7b6eb.firebasestorage.app",messagingSenderId:"356277005617",appId:"1:356277005617:web:101a6b09023b87785d9410"});
const auth=getAuth(app),db=getDatabase(app);
let uid=null,st=null;
const sd=()=>document.getElementById('sd');
const dot=s=>{sd().className=s;};

window.doLogin=async()=>{
  const e=document.getElementById('ae').value.trim(),p=document.getElementById('ap').value,m=document.getElementById('amsg');
  if(!e||!p){m.textContent='Gerekli alanları doldur.';return;}
  try{await signInWithEmailAndPassword(auth,e,p);}catch(er){m.textContent=er.code==='auth/invalid-credential'?'Hatalı e-posta veya şifre.':er.message;}
};
window.doReg=async()=>{
  const e=document.getElementById('ae').value.trim(),p=document.getElementById('ap').value,m=document.getElementById('amsg');
  if(!e||!p){m.textContent='Gerekli alanları doldur.';return;}
  if(p.length<6){m.textContent='Şifre en az 6 karakter.';return;}
  try{await createUserWithEmailAndPassword(auth,e,p);}catch(er){m.textContent=er.code==='auth/email-already-in-use'?'Bu e-posta kayıtlı.':er.message;}
};
window.doLogout=async()=>{await signOut(auth);};
document.getElementById('ap').addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin();});

window._sv=function(){
  if(!uid)return;dot('sy');clearTimeout(st);
  st=setTimeout(()=>{set(ref(db,`bv2/${uid}`),window.S).then(()=>dot('ok')).catch(()=>dot(''));},700);
};

onAuthStateChanged(auth,user=>{
  if(user){
    uid=user.uid;
    document.getElementById('auth').classList.add('hide');
    document.getElementById('app').classList.add('show');
    dot('sy');
    onValue(ref(db,`bv2/${uid}`),snap=>{
      const v=snap.val();
      if(v){
        window.S=v;
        ['txns','duzenli','kartTaksit','anaTablo','kartKesim'].forEach(k=>{if(!window.S[k])window.S[k]=k==='anaTablo'?DEF_AT():[];});
        if(!window.S.limitler)window.S.limitler={};
        if(!window.S.devirler)window.S.devirler={};
      }
      dot('ok');window.rAll();
    },()=>dot(''));
  } else {
    uid=null;
    document.getElementById('auth').classList.remove('hide');
    document.getElementById('app').classList.remove('show');
  }
});
</script>

<script>
const MN=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
const CATS_G=['Maaş','Ek Gelir','Kira Geliri','Yatırım Getirisi','Prim','Temettü','Diğer Gelir'];
const CATS_R=['Market','Yemek / Restoran','Fatura','Ulaşım','Yakıt','Sağlık','Çocuk','Giyim','Teknoloji','Eğlence','Tatil','Sigorta','Aidat / Abonelik','Diğer'];

function DEF_AT(){
  return [
    {id:'at1',ad:'Ana Gelir',  tip:'G'},
    {id:'at2',ad:'Ek Gelir',   tip:'G'},
    {id:'at3',ad:'Bonus Garanti',       tip:'K', kesim:1},
    {id:'at4',ad:'Maximum İş Bankası',  tip:'K', kesim:6},
    {id:'at5',ad:'Wolrd Vakıfbank',     tip:'K', kesim:6},
    {id:'at6',ad:'Bankkart',            tip:'K', kesim:1},
    {id:'at7',ad:'Yatırım',             tip:'Y'},
  ];
}

window.S = {
  currentMonth: new Date().toISOString().slice(0,7),
  anaTablo: DEF_AT(),
  limitler: {},   // {kalemId_YYYY-MM: tutar}
  devirler: {},   // {YYYY-MM: tutar} — bir önceki aydan gelen devir
  duzenli: [],    // [{id,ad,aylar:{YYYY-MM:tutar}}]
  txns: [],       // [{id,tarih,tip:'g'|'r',kalemId,ekstrem,kat,not,tutar}]
  kartTaksit:[],  // [{id,kalemId,ad,kat,aylikTutar,taksitSayisi,baslangicAy}]
};

const sv=()=>window._sv&&window._sv();
const fmt=v=>{const a=Math.abs(Math.round(v));return(v<0?'-':'')+'₺'+a.toLocaleString('tr-TR');};
const today=()=>new Date().toISOString().slice(0,10);
const lKey=(id,m)=>`${id}_${m}`;

/* ── LİMİT ── */
function getLimit(id,m){
  return parseFloat((S.limitler||{})[lKey(id,m)]||0);
}
function setLimit(id,m,v){
  if(!S.limitler)S.limitler={};
  S.limitler[lKey(id,m)]=parseFloat(v)||0;
  sv();rAll();
}

/* ── EKSTRE MANTIK ──
   Kart kesim günü = kartın extrasi hangi gün kesilir
   Harcama tarihi > kesim günü → bir sonraki ayın ekstresine girer
   Harcama tarihi ≤ kesim günü → bu ayın ekstresine girer
   Ekstre borcu bir SONRAKI AY ödenir → o ayın limitinden düşülür
*/
function ekstreAyiHesapla(tarih, kesimGun){
  // tarih: 'YYYY-MM-DD', kesimGun: 1-31
  const d=new Date(tarih);
  const gun=d.getDate();
  const [y,m]=[d.getFullYear(), d.getMonth()+1]; // 1-based
  let ekstreY=y, ekstreM=m;
  if(gun>kesimGun){
    // Bu ayın ekstresine değil, bir sonraki ayın
    ekstreM++;if(ekstreM>12){ekstreM=1;ekstreY++;}
  }
  // Bu ekstre bir sonraki ay ödenir → limitten o ay düşülür
  let odemeM=ekstreM+1,odemeY=ekstreY;
  if(odemeM>12){odemeM=1;odemeY++;}
  return `${odemeY}-${String(odemeM).padStart(2,'0')}`;
}

function ekstreNoteText(tarih, kalem){
  if(!tarih||kalem.tip!=='K')return null;
  const kesim=kalem.kesim||1;
  const odemeAy=ekstreAyiHesapla(tarih,kesim);
  const [,mo]=odemeAy.split('-').map(Number);
  return `Bu harcama ${MN[mo-1]} ayının limitinden düşülecek (kesim günü: ${kesim})`;
}

/* ── HESAPLAMALAR ── */
function duzenliTop(m){
  return (S.duzenli||[]).reduce((s,d)=>s+parseFloat((d.aylar||{})[m]||0),0);
}

// Belirli bir aya ait kart harcamaları toplamı (ekstre mantığına göre)
function kartHarcamaByAy(kalemId,odemeAy){
  // txns: eksterm alanı = ödeme ayı
  const txn=(S.txns||[]).filter(t=>t.tip==='r'&&t.kalemId===kalemId&&t.ekstreM===odemeAy).reduce((s,t)=>s+t.tutar,0);
  // taksitler
  const tak=(S.kartTaksit||[]).filter(kt=>kt.kalemId===kalemId).reduce((s,kt)=>{
    // her taksit başlangıç ayından itibaren taksitSayisi ay boyunca ilgili ayın ödemesine girer
    const endAy=addMonths(kt.baslangicAy,kt.taksitSayisi-1);
    if(odemeAy>=kt.baslangicAy&&odemeAy<=endAy)return s+kt.aylikTutar;
    return s;
  },0);
  return txn+tak;
}

function addMonths(ym,n){
  let[y,m]=ym.split('-').map(Number);m+=n;
  while(m>12){m-=12;y++;}while(m<1){m+=12;y--;}
  return`${y}-${String(m).padStart(2,'0')}`;
}

function toplamGelir(m){
  return (S.anaTablo||[]).filter(k=>k.tip==='G'||k.tip==='Y').reduce((s,k)=>{
    let v=getLimit(k.id,m);
    if(k.id==='at1') v-=duzenliTop(m); // Ana Gelir'den düzenli gider düşülür
    return s+v;
  },0);
}

function toplamGider(m){
  return (S.anaTablo||[]).filter(k=>k.tip==='K').reduce((s,k)=>s+kartHarcamaByAy(k.id,m),0)
       + (S.anaTablo||[]).filter(k=>k.tip==='Y').reduce((s,k)=>s+getLimit(k.id,m),0);
}

// Bir önceki ayın kalan bakiyesi = bu ayın deviri
function prevKalan(m){
  const prev=addMonths(m,-1);
  const stored=parseFloat((S.devirler||{})[m]||0);
  if(stored!==0)return stored;
  // otomatik hesapla
  const g=toplamGelir(prev);const gi=toplamGider(prev);const devir=parseFloat((S.devirler||{})[prev]||0);
  return g-gi+devir;
}

/* ── AY NAV ── */
function prevM(){
  S.currentMonth=addMonths(S.currentMonth,-1);sv();rAll();
}
function nextM(){
  S.currentMonth=addMonths(S.currentMonth,1);sv();rAll();
}
function mLabel(m){const[y,mo]=m.split('-').map(Number);return`${MN[mo-1]} ${y}`;}

/* ═══════════════════════════════════════
   SAYFA 1 — ANA TABLO
═══════════════════════════════════════ */
function rP1(){

  const devir=prevKalan(m);
  const dTop=duzenliTop(m);
  let html=`<div class="mnav"><button onclick="prevM()">‹</button><div class="mname">${mLabel(m)}</div><button onclick="nextM()">›</button></div>`;

  // Başlık
  html+=`<div class="at-hdr"><div>Kalem</div><div>Limit</div><div>Oran %</div><div>Net</div></div>`;

  // GELİRLER
  html+=`<div class="at-section">Gelirler</div>`;
  (S.anaTablo||[]).filter(k=>k.tip==='G').forEach(k=>{
    const idx=(S.anaTablo).indexOf(k);
    const limit=getLimit(k.id,m);
    const oran=parseFloat((S.limitler||{})[`${k.id}_oran_${m}`]||0);
    const net=k.id==='at1'?(limit*(1+oran/100)-dTop):(limit*(1+oran/100));
    html+=`<div class="at-row gelir-row"><div class="at-main">
      <div class="at-cell"><div class="at-ad">${k.ad}</div>${k.id==='at1'&&dTop>0?`<div class="at-sub">Düzenli: -${fmt(dTop)}</div>`:''}</div>
      <div class="at-cell"><input class="at-inp" type="number" value="${limit||''}" placeholder="0" onchange="setLimit('${k.id}','${m}',this.value)"></div>
      <div class="at-cell"><input class="at-inp" type="number" value="${oran||''}" placeholder="0" onchange="S.limitler['${k.id}_oran_${m}']=parseFloat(this.value)||0;sv();rP1()"></div>
      <div class="at-cell"><div class="at-val ${net>=0?'p':'n'}">${fmt(net)}</div></div>
    </div></div>`;
  });

  // Devir
  html+=`<div class="at-row gelir-row" style="border-left-color:var(--P)"><div class="at-main">
    <div class="at-cell"><div class="at-ad" style="color:var(--P)">Devirli Bakiye</div><div class="at-sub">Önceki aydan otomatik</div></div>
    <div class="at-cell" style="grid-column:span 2"><div style="display:flex;align-items:center;gap:6px">
      <input class="at-inp" type="number" value="${(S.devirler||{})[m]||''}" placeholder="Otomatik" style="color:var(--P)"
        onchange="if(!S.devirler)S.devirler={};S.devirler['${m}']=parseFloat(this.value)||0;sv();rP1()"
        title="Boş bırakırsanız önceki ay kalan bakiyesi otomatik alınır">
      ${(S.devirler||{})[m]?`<button onclick="delete S.devirler['${m}'];sv();rP1()" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px">×</button>`:''}
    </div></div>
    <div class="at-cell"><div class="at-val a">${fmt(devir)}</div></div>
  </div></div>`;

  // GİDERLER — KARTLAR
  html+=`<div class="at-section">Kart Limitleri</div>`;
  (S.anaTablo||[]).filter(k=>k.tip==='K').forEach(k=>{
    const idx=(S.anaTablo).indexOf(k);
    const limit=getLimit(k.id,m);
    const oran=parseFloat((S.limitler||{})[`${k.id}_oran_${m}`]||0);
    const netLimit=limit*(1+oran/100);
    const harcanan=kartHarcamaByAy(k.id,m);
    const kalan=netLimit-harcanan;
    html+=`<div class="at-row gider-row"><div class="at-main">
      <div class="at-cell"><div class="at-ad">${k.ad}</div><div class="at-sub">Kesim: ${k.kesim||'?'}. gün · Harcanan: ${fmt(harcanan)}</div></div>
      <div class="at-cell"><input class="at-inp" type="number" value="${limit||''}" placeholder="0" onchange="setLimit('${k.id}','${m}',this.value)"></div>
      <div class="at-cell"><input class="at-inp" type="number" value="${oran||''}" placeholder="0" onchange="S.limitler['${k.id}_oran_${m}']=parseFloat(this.value)||0;sv();rP1()"></div>
      <div class="at-cell"><div class="at-val ${kalan>=0?'p':'n'}">${fmt(kalan)}</div></div>
    </div></div>`;
  });

  // YATIRIM
  const yatKalemler=(S.anaTablo||[]).filter(k=>k.tip==='Y');
  if(yatKalemler.length){
    html+=`<div class="at-section">Yatırım</div>`;
    yatKalemler.forEach(k=>{
      const limit=getLimit(k.id,m);
      const oran=parseFloat((S.limitler||{})[`${k.id}_oran_${m}`]||0);
      const net=limit*(1+oran/100);
      html+=`<div class="at-row" style="border-left:3px solid var(--B)"><div class="at-main">
        <div class="at-cell"><div class="at-ad">${k.ad}</div></div>
        <div class="at-cell"><input class="at-inp" type="number" value="${limit||''}" placeholder="0" onchange="setLimit('${k.id}','${m}',this.value)"></div>
        <div class="at-cell"><input class="at-inp" type="number" value="${oran||''}" placeholder="0" onchange="S.limitler['${k.id}_oran_${m}']=parseFloat(this.value)||0;sv();rP1()"></div>
        <div class="at-cell"><div class="at-val" style="color:var(--B2)">${fmt(net)}</div></div>
      </div></div>`;
    });
  }

  // ÖZET
  const tG=toplamGelir(m)+devir;
  const tGi=toplamGider(m)+(S.anaTablo||[]).filter(k=>k.tip==='Y').reduce((s,k)=>s+getLimit(k.id,m),0);
  const kalan=tG-tGi;
  html+=`<div class="ozet">
    <div class="oz-row"><span class="oz-lbl">Toplam Gelir (devir dahil)</span><span class="oz-val" style="color:var(--G2)">${fmt(tG)}</span></div>

  </div>`;

  html+=`<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
    <button class="bs a" onclick="addKalem()">+ Kalem Ekle</button>
    <button class="bs" onclick="doLogout()" style="margin-left:auto;color:var(--t3)">Çıkış</button>
  </div>`;

  document.getElementById('p1').innerHTML=html;
}

function addKalem(){
  const tip=prompt('Tür (G=Gelir, K=Kart, Y=Yatırım):','K');if(!tip)return;
  const ad=prompt('Kalem adı:');if(!ad)return;
  const yeni={id:'at'+Date.now(),ad,tip:tip.toUpperCase()};
  if(tip.toUpperCase()==='K'){yeni.kesim=parseInt(prompt('Ekstre kesim günü (1-31):',1)||1);}
  S.anaTablo.push(yeni);sv();rP1();
}

/* ═══════════════════════════════════════
   SAYFA 2 — DÜZENLİ GİDERLER
═══════════════════════════════════════ */
function rP2(){
  const m=S.currentMonth;
  const months=[];const[cy,cm]=m.split('-').map(Number);
  for(let i=-1;i<11;i++){let y=cy,mo=cm+i;while(mo>12){mo-=12;y++;}while(mo<1){mo+=12;y--;}months.push(`${y}-${String(mo).padStart(2,'0')}`);}
  const top=duzenliTop(m);

  let html=`<div class="ph"><div class="pt">Düzenli Giderler</div><button class="bs a" onclick="addDG()">+ Ekle</button></div>`;
  html+=`<div style="background:var(--bg2);border:1px solid var(--A);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Bu Ay Toplam</div><div style="font-family:var(--fm);font-size:20px;font-weight:700;color:var(--A)">${fmt(top)}</div></div>
    <div style="font-size:11px;color:var(--t2);text-align:right">Ana Gelir'den<br>otomatik düşülür</div>
  </div>`;

  if(!(S.duzenli||[]).length){html+=`<div class="empty">Henüz düzenli gider yok.<br>+ Ekle ile başla.</div>`;document.getElementById('p2').innerHTML=html;return;}

  html+=`<div class="dg-wrap"><table class="dg-tbl" style="min-width:${months.length*96+160}px">
  <thead><tr>
    <th>Kalem</th>`;
  months.forEach(mo=>{const[,moi]=mo.split('-').map(Number);const ic=mo===m;html+=`<th style="${ic?'color:var(--A);background:rgba(245,166,35,0.08)':''}">${MN[moi-1]}${ic?' ★':''}</th>`;});
  html+=`</tr></thead><tbody>`;

  (S.duzenli||[]).forEach((dg,i)=>{
    html+=`<tr><td>${dg.ad}<button class="dg-del" onclick="delDG('${dg.id}')">×</button></td>`;
    months.forEach(mo=>{
      const v=(dg.aylar||{})[mo]||'';const ic=mo===m;
      html+=`<td class="${ic?'dg-cur':''}"><input class="dg-inp" type="number" value="${v}" placeholder="—"
        onchange="if(!S.duzenli[${i}].aylar)S.duzenli[${i}].aylar={};S.duzenli[${i}].aylar['${mo}']=parseFloat(this.value)||0;sv();rP1();rP2()"></td>`;
    });
    html+=`</tr>`;
  });

  html+=`<tr><td style="position:sticky;left:0;background:var(--bg3);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);font-weight:700">Toplam</td>`;
  months.forEach(mo=>{const t=duzenliTop(mo);const ic=mo===m;html+=`<td class="dg-top ${ic?'cur':''}">${t>0?fmt(t):'—'}</td>`;});
  html+=`</tr></tbody></table></div>`;
  document.getElementById('p2').innerHTML=html;
}

function addDG(){const ad=prompt('Kalem adı (örn: Su / Fatura):');if(!ad)return;if(!S.duzenli)S.duzenli=[];S.duzenli.push({id:'dg'+Date.now(),ad,aylar:{}});sv();rP2();}
function delDG(id){if(!confirm('Silinsin mi?'))return;S.duzenli=S.duzenli.filter(d=>d.id!==id);sv();rP2();rP1();}

/* ═══════════════════════════════════════
   SAYFA 3 — KARTLAR
═══════════════════════════════════════ */
function rP3(){
  const m=S.currentMonth;
  const kartlar=(S.anaTablo||[]).filter(k=>k.tip==='K');
  const[y,mo]=m.split('-').map(Number);

  let html=`<div class="ph"><div class="pt">Kartlar</div><button class="bs a" onclick="addKT()">+ Taksit / Abo.</button></div>`;
  html+=`<div style="font-size:12px;color:var(--A);margin-bottom:12px;background:var(--aBg);border-radius:var(--rs);padding:8px 12px;font-size:11px">
    <strong>Ekstre mantığı:</strong> Harcama tarihi kesim gününden sonraysa bir sonraki ayın ekstresine, o da gelecek ay ödeniyor. Kart limitini etkileyen bu ödeme ayıdır.
  </div>`;

  kartlar.forEach(k=>{
    const limit=getLimit(k.id,m);
    const oran=parseFloat((S.limitler||{})[`${k.id}_oran_${m}`]||0);
    const netLimit=limit*(1+oran/100);
    const harcanan=kartHarcamaByAy(k.id,m);
    const kalan=netLimit-harcanan;
    const pct=netLimit>0?Math.min(100,Math.round(harcanan/netLimit*100)):0;
    const pbCol=pct>90?'var(--R)':pct>70?'var(--A)':'var(--G)';

    // Bu ayın borcu oluşturan işlemler
    const ayIslemler=(S.txns||[]).filter(t=>t.tip==='r'&&t.kalemId===k.id&&t.ekstreM===m);
    const ayTaksitler=(S.kartTaksit||[]).filter(kt=>kt.kalemId===k.id&&kt.baslangicAy<=m&&addMonths(kt.baslangicAy,kt.taksitSayisi-1)>=m);

    html+=`<div class="kart-panel">
      <div class="kp-head">
        <div><div class="kp-ad">${k.ad}</div><div class="kp-kesim">Ekstre kesim: her ayın ${k.kesim||'?'}. günü · Ödeme: sonraki ay</div></div>
        <div class="kp-kalan"><div class="kp-kalan-val" style="color:${kalan>=0?'var(--G2)':'var(--R2)'}">${fmt(kalan)}</div><div class="kp-kalan-lbl">kalan</div></div>
      </div>
      <div class="kp-pb"><div class="kp-pbf" style="width:${pct}%;background:${pbCol}"></div></div>
      <div class="kp-stats">
        <div class="kps"><div class="kps-l">Limit</div><div class="kps-v">${fmt(netLimit)}</div></div>
        <div class="kps"><div class="kps-l">Harcanan</div><div class="kps-v" style="color:var(--R2)">${fmt(harcanan)}</div></div>
        <div class="kps"><div class="kps-l">Kalan</div><div class="kps-v" style="color:${kalan>=0?'var(--G2)':'var(--R2)'}">${fmt(kalan)}</div></div>
        <div class="kps"><div class="kps-l">Kullanım</div><div class="kps-v" style="color:${pct>70?'var(--A)':'var(--t2)'}">${pct}%</div></div>
      </div>`;

    if(ayTaksitler.length||ayIslemler.length){
      html+=`<div class="kp-items">`;
      ayTaksitler.forEach(kt=>{
        const kal=kt.taksitSayisi-monthDiff(kt.baslangicAy,m);
        html+=`<div class="kp-item"><div><div class="kp-item-ad">📋 ${kt.ad}</div><div class="kp-item-sub">${kt.kat} · ${kal}/${kt.taksitSayisi} taksit kaldı</div></div><div style="display:flex;align-items:center;gap:8px"><div class="kp-item-val">${fmt(kt.aylikTutar)}/ay</div><button onclick="delKT('${kt.id}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px">×</button></div></div>`;
      });
      ayIslemler.slice(0,4).forEach(t=>{
        html+=`<div class="kp-item"><div><div class="kp-item-ad">💳 ${t.kat}</div><div class="kp-item-sub">${t.tarih} ${t.not?'· '+t.not:''}</div></div><div class="kp-item-val">${fmt(t.tutar)}</div></div>`;
      });
      if(ayIslemler.length>4)html+=`<div style="font-size:11px;color:var(--t3);padding:6px 0">+ ${ayIslemler.length-4} işlem daha…</div>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  document.getElementById('p3').innerHTML=html;
}

function monthDiff(a,b){
  const[ay,am]=a.split('-').map(Number);const[by,bm]=b.split('-').map(Number);
  return(by-ay)*12+(bm-am);
}

function addKT(){
  const kartlar=(S.anaTablo||[]).filter(k=>k.tip==='K');
  const opts=kartlar.map((k,i)=>`${i+1}. ${k.ad}`).join('\n');
  const idx=parseInt(prompt(`Hangi kart?\n${opts}`))-1;
  if(isNaN(idx)||!kartlar[idx])return;
  const ad=prompt('Harcama adı (örn: Ev Dolap):');if(!ad)return;
  const aylik=parseFloat(prompt('Aylık taksit tutarı (₺):')||0);if(!aylik)return;
  const sayi=parseInt(prompt('Taksit sayısı:',1)||1);
  const kat=prompt('Kategori:','Diğer')||'Diğer';
  const baslangic=prompt('Başlangıç ayı (YYYY-MM, bu ayın ekstre ödemesi):', S.currentMonth)||S.currentMonth;
  if(!S.kartTaksit)S.kartTaksit=[];
  S.kartTaksit.push({id:'kt'+Date.now(),kalemId:kartlar[idx].id,ad,kat,aylikTutar:aylik,taksitSayisi:sayi,baslangicAy:baslangic});
  sv();rP3();rP1();
}
function delKT(id){if(!confirm('Silinsin mi?'))return;S.kartTaksit=S.kartTaksit.filter(k=>k.id!==id);sv();rP3();rP1();}

/* ═══════════════════════════════════════
   SAYFA 4 — İŞLEMLER
═══════════════════════════════════════ */
function rP4(){
  const m=S.currentMonth;
  const kartlar=(S.anaTablo||[]).filter(k=>k.tip==='K');
  const fK=document.getElementById('f4k')?.value||'';
  const fA=document.getElementById('f4a')?.value||m;
  const sorted=[...(S.txns||[])].sort((a,b)=>b.tarih.localeCompare(a.tarih));
  const fil=sorted.filter(t=>(!fK||t.kalemId===fK)&&t.tarih.startsWith(fA));
  const months=[...new Set((S.txns||[]).map(t=>t.tarih.slice(0,7)))].sort().reverse();
  const kOpts=kartlar.map(k=>`<option value="${k.id}">${k.ad}</option>`).join('');

  const aG=fil.filter(t=>t.tip==='g').reduce((s,t)=>s+t.tutar,0);
  const aR=fil.filter(t=>t.tip==='r').reduce((s,t)=>s+t.tutar,0);

  let html=`<div class="ph"><div class="pt">İşlemler</div></div>`;
  html+=`<div style="display:flex;gap:8px;margin-bottom:12px;overflow-x:auto">
    <select id="f4k" onchange="rP4()" style="flex:1;padding:9px 12px;font-size:13px"><option value="">Tüm Kartlar</option>${kOpts}</select>
    <select id="f4a" onchange="rP4()" style="flex:1;padding:9px 12px;font-size:13px">${months.map(mm=>`<option value="${mm}"${mm===m?' selected':''}>${mm}</option>`).join('')}</select>
  </div>`;
  html+=`<div class="sum-cards">
    <div class="sc" style="border-left:2px solid var(--G)"><div class="sc-l">Gelir</div><div class="sc-v" style="color:var(--G2)">${fmt(aG)}</div></div>
    <div class="sc" style="border-left:2px solid var(--R)"><div class="sc-l">Gider</div><div class="sc-v" style="color:var(--R2)">${fmt(aR)}</div></div>
  </div>`;

  if(!fil.length){html+=`<div class="empty">İşlem yok.<br>+ butonu ile ekle.</div>`;}
  fil.forEach(t=>{
    const k=kartlar.find(k=>k.id===t.kalemId);
    const isR=t.tip==='r';
    const ekstreAy=t.ekstreM?`· Ekstre: ${t.ekstreM}`:'';
    html+=`<div class="txn-row">
      <div class="txn-ico" style="background:${isR?'var(--rBg)':'var(--gBg)'}">${isR?'💳':'💰'}</div>
      <div class="txn-m">
        <div class="txn-n">${t.kat}${t.not?' · '+t.not:''}</div>
        <div class="txn-s">${t.tarih} · ${k?k.ad:'?'} ${ekstreAy}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="txn-a" style="color:${isR?'var(--R2)':'var(--G2)'}">${isR?'-':'+'}${fmt(t.tutar)}</div>
        <button class="txn-del" onclick="delT(${t.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
      </div>
    </div>`;
  });
  html+=`<button onclick="expCSV()" style="margin-top:10px;width:100%;padding:11px;border-radius:var(--rs);border:1px solid var(--b2);background:none;color:var(--t2);font-family:var(--ff);font-size:13px;cursor:pointer">CSV İndir</button>`;
  document.getElementById('p4').innerHTML=html;
}

function delT(id){S.txns=S.txns.filter(t=>t.id!==id);sv();rP4();rP1();rP3();}
function expCSV(){
  const h='Tarih,Tip,Kart,Ekstre Ayı,Kategori,Not,Tutar\n';
  const b=(S.txns||[]).sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(t=>{
    const k=(S.anaTablo||[]).find(k=>k.id===t.kalemId);
    return`${t.tarih},${t.tip==='r'?'Gider':'Gelir'},"${k?k.ad:'?'}","${t.ekstreM||''}","${t.kat||''}","${t.not||''}",${t.tutar}`;
  }).join('\n');
  const blob=new Blob(['\ufeff'+h+b],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='islemler.csv';a.click();URL.revokeObjectURL(url);
}

/* ── QUICK MODAL ── */
let qTip='r';
function openQ(){
  document.getElementById('qd').value=today();
  document.getElementById('qt').value='';
  document.getElementById('qn').value='';
  document.getElementById('qmsg').textContent='';
  fillQK();fillQC();hideEN();
  document.getElementById('qm').classList.add('open');
  setTimeout(()=>document.getElementById('qt').focus(),300);
}
function closeQ(e){if(e&&e.target!==document.getElementById('qm'))return;document.getElementById('qm').classList.remove('open');}
function setQT(t){
  qTip=t;
  document.getElementById('qg').className='tsw'+(t==='g'?' g':'');
  document.getElementById('qr').className='tsw'+(t==='r'?' r':'');
  fillQK();fillQC();
}
function fillQK(){
  const all=(S.anaTablo||[]);
  const opts=qTip==='r'
    ? all.filter(k=>k.tip==='K').map(k=>`<option value="${k.id}">${k.ad}</option>`).join('')
    : all.filter(k=>k.tip==='G').map(k=>`<option value="${k.id}">${k.ad}</option>`).join('');
  document.getElementById('qk').innerHTML=opts;
}
function fillQC(){
  document.getElementById('qc').innerHTML=(qTip==='g'?CATS_G:CATS_R).map(c=>`<option>${c}</option>`).join('');
}
function showEkstreNote(){
  const tarih=document.getElementById('qd').value;
  const kalemId=document.getElementById('qk').value;
  const kalem=(S.anaTablo||[]).find(k=>k.id===kalemId);
  const en=document.getElementById('en');
  if(!tarih||!kalem||kalem.tip!=='K'){en.style.display='none';return;}
  const note=ekstreNoteText(tarih,kalem);
  if(note){en.textContent=note;en.style.display='block';}else{en.style.display='none';}
}
function hideEN(){document.getElementById('en').style.display='none';}
document.addEventListener('change',e=>{if(e.target.id==='qd'||e.target.id==='qk')showEkstreNote();});

function saveQ(){
  const tarih=document.getElementById('qd').value;
  const tutar=parseFloat(document.getElementById('qt').value||0);
  const kalemId=document.getElementById('qk').value;
  const kat=document.getElementById('qc').value;
  const not=document.getElementById('qn').value;
  if(!tarih||!tutar){document.getElementById('qmsg').textContent='Tarih ve tutar gerekli.';return;}
  const kalem=(S.anaTablo||[]).find(k=>k.id===kalemId);
  let ekstreM=null;
  if(qTip==='r'&&kalem&&kalem.tip==='K'){
    ekstreM=ekstreAyiHesapla(tarih,kalem.kesim||1);
  }
  if(!S.txns)S.txns=[];
  S.txns.push({id:Date.now(),tarih,tip:qTip,kalemId,ekstreM,kat,not,tutar});
  sv();rAll();
  document.getElementById('qm').classList.remove('open');
}

/* ── NAV ── */
function gT(n,el){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(t=>t.classList.remove('on'));
  document.getElementById('p'+n).classList.add('on');
  el.classList.add('on');
  document.getElementById('scr').scrollTop=0;
  [rP1,rP2,rP3,rP4][n-1]();
}
window.rAll=function(){
  rP1();
  const a=document.querySelector('.pg.on')?.id;
  if(a==='p2')rP2();else if(a==='p3')rP3();else if(a==='p4')rP4();
};
</script>
