<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bütçe">
<meta name="theme-color" content="#0a0a0a">
<title>Dinamik Bütçe Takip</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#131313;--bg3:#1c1c1c;--bg4:#242424;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#edeae4;--t2:#8a8480;--t3:#504d4a;
  --red:#f04438;--red2:#ff7b72;--rBg:rgba(240,68,56,0.1);
  --amber:#f5a623;--amber2:#ffd166;--aBg:rgba(245,166,35,0.1);
  --green:#22c55e;--green2:#4ade80;--gBg:rgba(34,197,94,0.1);
  --blue:#3b82f6;--blue2:#60a5fa;--blBg:rgba(59,130,246,0.1);
  --teal:#14b8a6;--teal2:#2dd4bf;--tBg:rgba(20,184,166,0.1);
  --r:12px;--rs:7px;--tab:60px;
  --ff:'Barlow',sans-serif;--fm:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ff);overflow:hidden}

/* ── AUTH ── */
#auth{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px}
#auth.hide{display:none}
.auth-inner{width:100%;max-width:360px}
.auth-logo{font-family:var(--fm);font-size:13px;color:var(--amber);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.auth-h{font-size:28px;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--t2);margin-bottom:32px}
.inp-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.inp-group label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:var(--ff);font-size:15px;padding:12px 14px;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--amber)}
select option{background:var(--bg3)}
.btn-full{width:100%;padding:14px;border-radius:var(--rs);border:none;font-family:var(--ff);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:10px}
.btn-amber{background:var(--amber);color:#0a0a0a}
.btn-amber:active{background:var(--amber2)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-ghost:active{background:var(--bg3)}
.auth-msg{font-size:12px;color:var(--red2);text-align:center;margin-top:8px;min-height:18px}

/* ── LAYOUT ── */
#app{display:none;flex-direction:column;height:100vh;height:calc(100vh - env(safe-area-inset-top));padding-top:env(safe-area-inset-top);max-width:680px;margin:0 auto}
#app.show{display:flex}
#scroll{flex:1;overflow-y:auto;scrollbar-width:none}
#scroll::-webkit-scrollbar{display:none}

/* ── TAB BAR ── */
#tabs{height:calc(var(--tab) + env(safe-area-inset-bottom));background:rgba(10,10,10,0.96);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding:8px 4px 0;backdrop-filter:blur(20px);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:var(--t3);cursor:pointer;border-radius:var(--rs);transition:color .12s}
.tab svg{width:20px;height:20px;stroke-width:1.8}
.tab span{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.tab.on{color:var(--amber)}

/* ── FAB ── */
#fab{position:fixed;bottom:calc(var(--tab) + env(safe-area-inset-bottom) + 14px);right:max(16px, calc(50% - 340px + 16px));width:50px;height:50px;border-radius:50%;background:var(--amber);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 0 0 0 rgba(245,166,35,0.4);animation:pulse-fab 2s infinite}
#fab:active{transform:scale(.92)}
#fab svg{width:22px;height:22px;stroke:#0a0a0a;stroke-width:2.5}
@keyframes pulse-fab{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,.4)}70%{box-shadow:0 0 0 10px rgba(245,166,35,0)}}

/* ── PAGES ── */
.pg{display:none;padding:16px 16px calc(var(--tab) + env(safe-area-inset-bottom) + 80px);animation:fadeUp .18s ease}
.pg.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── SYNC DOT ── */
#sdot{position:fixed;top:calc(env(safe-area-inset-top) + 8px);right:14px;width:7px;height:7px;border-radius:50%;background:var(--t3);z-index:100;transition:background .3s}
#sdot.ok{background:var(--green)}
#sdot.sync{background:var(--amber);animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── AY NAVİGASYON ── */
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.month-nav button{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:8px 14px;cursor:pointer;font-size:18px;line-height:1}
.month-nav button:active{background:var(--bg4)}
.month-name{flex:1;text-align:center;font-size:18px;font-weight:700;font-family:var(--fm);letter-spacing:.04em;color:var(--amber)}

/* ── ANA TABLO ── */
.section-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin:18px 0 8px;padding-left:4px}
.tablo-row{display:grid;grid-template-columns:1fr 80px 72px 1fr;gap:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden}
.tablo-row:has(.gelir-dot){border-left:3px solid var(--green)}
.tablo-row:has(.gider-dot){border-left:3px solid var(--red)}
.tr-cell{padding:11px 12px;font-size:13px;display:flex;flex-direction:column;justify-content:center}
.tr-cell:not(:last-child){border-right:1px solid var(--border)}
.tr-label{font-size:12px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.tr-sub{font-size:10px;color:var(--t3)}
.tr-input{font-family:var(--fm);font-size:13px;padding:0;border:none;background:transparent;color:var(--text);width:100%;text-align:right}
.tr-input:focus{outline:none;color:var(--amber)}
.tr-val{font-family:var(--fm);font-size:13px;font-weight:600;text-align:right}
.tr-val.pos{color:var(--green2)}
.tr-val.neg{color:var(--red2)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gelir-dot{background:var(--green)}
.gider-dot{background:var(--red)}

/* ÖZET KART */
.ozet-kart{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:8px}
.ozet-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.ozet-row:last-child{border-bottom:none;padding-top:10px;margin-top:4px}
.ozet-lbl{font-size:13px;color:var(--t2)}
.ozet-val{font-family:var(--fm);font-size:14px;font-weight:600}

/* ── DÜZENLI GİDERLER ── */
.dg-row{display:grid;grid-template-columns:1fr repeat(12,auto);gap:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;overflow:hidden}
.dg-cell{padding:9px 10px;font-size:12px;border-right:1px solid var(--border)}
.dg-cell:last-child{border-right:none}
.dg-name{font-weight:600;min-width:120px}
.dg-amt{font-family:var(--fm);text-align:right;white-space:nowrap;min-width:80px}
.dg-highlight{background:rgba(245,166,35,0.08);color:var(--amber);font-weight:600}
.dg-header{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;background:var(--bg3)}

/* ── KART HARCAMA ── */
.kart-ozet{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px}
.kart-ozet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.kart-ad{font-size:15px;font-weight:700}
.kart-kalan{font-family:var(--fm);font-size:20px;font-weight:600}
.kart-pb{height:6px;background:rgba(255,255,255,0.07);border-radius:3px;margin-bottom:8px;overflow:hidden}
.kart-pbf{height:100%;border-radius:3px;transition:width .4s}
.kart-stats{display:flex;gap:16px}
.kstat{font-size:11px;color:var(--t3)}
.kstat span{font-family:var(--fm);color:var(--text);font-size:12px;display:block;margin-top:1px}

/* ── İŞLEM FORMU ── */
#qmodal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center}
#qmodal.open{display:flex}
.qsheet{background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--border2);border-bottom:none;padding:20px 20px calc(28px + env(safe-area-inset-bottom));width:100%;max-width:680px;animation:su .22s ease;max-height:85vh;overflow-y:auto}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.qhandle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.type-sw{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg3);border-radius:var(--rs);padding:3px;margin-bottom:14px}
.tsw{padding:10px;text-align:center;border:none;background:none;border-radius:5px;font-family:var(--ff);font-size:14px;font-weight:600;cursor:pointer;color:var(--t2);transition:all .12s}
.tsw.g{background:var(--gBg);color:var(--green2)}
.tsw.r{background:var(--rBg);color:var(--red2)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-save{width:100%;padding:14px;border-radius:var(--rs);border:none;background:var(--amber);color:#0a0a0a;font-family:var(--ff);font-size:15px;font-weight:700;cursor:pointer}
.btn-save:active{background:var(--amber2)}
.msg{font-size:12px;color:var(--t3);margin-top:8px;min-height:16px}

/* ── İŞLEM LİSTESİ ── */
.txn-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px}
.txn-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.txn-main{flex:1;min-width:0}
.txn-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-sub{font-size:11px;color:var(--t3);margin-top:1px}
.txn-amt{font-family:var(--fm);font-size:14px;font-weight:600;white-space:nowrap}
.txn-del{background:none;border:none;color:var(--t3);cursor:pointer;padding:6px;border-radius:6px}
.txn-del:active{color:var(--red2)}
.empty{text-align:center;padding:32px;color:var(--t3);font-size:13px}

/* ── GENEL ── */
.btn-sm{padding:6px 12px;border-radius:var(--rs);border:1px solid var(--border2);background:none;color:var(--text);font-family:var(--ff);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-sm:active{background:var(--bg3)}
.btn-amber-sm{border-color:var(--amber);color:var(--amber);background:var(--aBg)}
.btn-del-sm{border-color:transparent;color:var(--red2)}
.page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.01em}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.04em}
.badge-g{background:var(--gBg);color:var(--green2)}
.badge-r{background:var(--rBg);color:var(--red2)}
.badge-a{background:var(--aBg);color:var(--amber)}
.divider-label{display:flex;align-items:center;gap:10px;margin:16px 0 10px}
.divider-label span{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.divider-label::before,.divider-label::after{content:'';flex:1;height:1px;background:var(--border)}
.toplam-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.t-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.t-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.t-val{font-family:var(--fm);font-size:18px;font-weight:600}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-inner">
    <div class="auth-logo">Dinamik Bütçe</div>
    <div class="auth-h">Giriş Yap</div>
    <div class="auth-sub">Tüm cihazlarınızda senkronize</div>
    <div class="inp-group"><label>E-posta</label><input type="email" id="ae" placeholder="ornek@mail.com" inputmode="email" autocomplete="email"></div>
    <div class="inp-group"><label>Şifre</label><input type="password" id="ap" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-full btn-amber" onclick="doLogin()">Giriş Yap</button>
    <button class="btn-full btn-ghost" onclick="doRegister()">Hesap Oluştur</button>
    <div class="auth-msg" id="amsg"></div>
  </div>
</div>

<!-- SYNC DOT -->
<div id="sdot"></div>

<!-- APP -->
<div id="app">
  <div id="scroll">
    <div id="pg1" class="pg on"></div>
    <div id="pg2" class="pg"></div>
    <div id="pg3" class="pg"></div>
    <div id="pg4" class="pg"></div>
  </div>

  <button id="fab" onclick="openQ()">
    <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <nav id="tabs">
    <button class="tab on" onclick="goTab(1,this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
      <span>Ana Tablo</span>
    </button>
    <button class="tab" onclick="goTab(2,this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      <span>Düzenli</span>
    </button>
    <button class="tab" onclick="goTab(3,this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span>Kartlar</span>
    </button>
    <button class="tab" onclick="goTab(4,this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>İşlemler</span>
    </button>
  </nav>
</div>

<!-- QUICK MODAL -->
<div id="qmodal" onclick="closeQ(event)">
  <div class="qsheet">
    <div class="qhandle"></div>
    <div class="type-sw">
      <button class="tsw g" id="q-g" onclick="setQT('g')">+ Gelir</button>
      <button class="tsw" id="q-r" onclick="setQT('r')">− Gider</button>
    </div>
    <div class="fg-row" style="margin-bottom:12px">
      <div class="fg" style="margin:0"><label>Tarih</label><input type="date" id="q-d"></div>
      <div class="fg" style="margin:0"><label>Tutar (₺)</label><input type="number" id="q-t" placeholder="0" inputmode="decimal"></div>
    </div>
    <div class="fg"><label>Kart / Hesap</label><select id="q-k"></select></div>
    <div class="fg"><label>Kategori</label><select id="q-c"></select></div>
    <div class="fg"><label>Not</label><input type="text" id="q-n" placeholder="Opsiyonel..."></div>
    <button class="btn-save" onclick="saveQ()">Kaydet</button>
    <div class="msg" id="q-msg"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getDatabase,ref,set,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app=initializeApp({
  apiKey:"AIzaSyAq6IUR72qKIcueiU7m-teS_iON80yL9TI",
  authDomain:"finans-takip-7b6eb.firebaseapp.com",
  databaseURL:"https://finans-takip-7b6eb-default-rtdb.firebaseio.com",
  projectId:"finans-takip-7b6eb",
  storageBucket:"finans-takip-7b6eb.firebasestorage.app",
  messagingSenderId:"356277005617",
  appId:"1:356277005617:web:101a6b09023b87785d9410"
});
const auth=getAuth(app);
const db=getDatabase(app);
let uid=null,saveTimer=null;

function setDot(s){const d=document.getElementById('sdot');d.className=s==='ok'?'ok':s==='sync'?'sync':'';}

window._fbSave=function(){
  if(!uid)return;setDot('sync');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    set(ref(db,`b/${uid}`),window.S).then(()=>setDot('ok')).catch(()=>setDot(''));
  },700);
};

window.doLogin=async()=>{
  const e=document.getElementById('ae').value.trim(),p=document.getElementById('ap').value,m=document.getElementById('amsg');
  if(!e||!p){m.textContent='E-posta ve şifre gerekli.';return;}
  try{await signInWithEmailAndPassword(auth,e,p);}
  catch(err){m.textContent=err.code==='auth/invalid-credential'?'Hatalı e-posta veya şifre.':err.message;}
};
window.doRegister=async()=>{
  const e=document.getElementById('ae').value.trim(),p=document.getElementById('ap').value,m=document.getElementById('amsg');
  if(!e||!p){m.textContent='E-posta ve şifre gerekli.';return;}
  if(p.length<6){m.textContent='Şifre en az 6 karakter.';return;}
  try{await createUserWithEmailAndPassword(auth,e,p);}
  catch(err){m.textContent=err.code==='auth/email-already-in-use'?'Bu e-posta kayıtlı.':err.message;}
};
window.doLogout=async()=>{await signOut(auth);};

document.getElementById('ap').addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin();});

onAuthStateChanged(auth,user=>{
  if(user){
    uid=user.uid;
    document.getElementById('auth').classList.add('hide');
    document.getElementById('app').classList.add('show');
    setDot('sync');
    onValue(ref(db,`b/${uid}`),snap=>{
      const v=snap.val();
      if(v){window.S=v;if(!window.S.txns)window.S.txns=[];if(!window.S.duzenliGiderler)window.S.duzenliGiderler=[];if(!window.S.kartTaksitler)window.S.kartTaksitler=[];}
      setDot('ok');window.renderAll();
    },()=>setDot(''));
  } else {
    uid=null;
    document.getElementById('auth').classList.remove('hide');
    document.getElementById('app').classList.remove('show');
  }
});
</script>

<script>
const MN=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
const CATS_G=['Maaş','Ek Gelir','Kira Geliri','Yatırım Getirisi','Prim','Diğer Gelir'];
const CATS_R=['Market','Yemek','Fatura','Ulaşım','Sağlık','Çocuk','Eğlence','Giyim','Teknoloji','Sigorta','Aidat','Diğer'];
const KART_COLORS=['#f5a623','#3b82f6','#22c55e','#a78bfa','#f04438'];

// Varsayılan state
window.S = {
  currentMonth: new Date().toISOString().slice(0,7),
  // Ana tablo kalemleri — her kalem {id, ad, tip:'gelir'|'gider', limit, oran, devirli}
  anaTablo: [
    {id:'at1', ad:'Ana Gelir',          tip:'gelir', limit:45000, oran:0},
    {id:'at2', ad:'Ek Gelir',           tip:'gelir', limit:10000, oran:0},
    {id:'at3', ad:'Bonus Garanti',      tip:'gider', limit:15000, oran:0},
    {id:'at4', ad:'Maximum İş Bankası', tip:'gider', limit:15000, oran:0},
    {id:'at5', ad:'Wolrd Vakıfbank',    tip:'gider', limit:15000, oran:0},
    {id:'at6', ad:'Bankkart',           tip:'gider', limit:10000, oran:0},
    {id:'at7', ad:'Yatırım',            tip:'gider', limit:10000, oran:0},
  ],
  devirler: {}, // {YYYY-MM: tutar}
  // Düzenli giderler — her ay tutarları {id, ad, aylar:{YYYY-MM: tutar}}
  duzenliGiderler: [
    {id:'dg1', ad:'Su / Fatura',        aylar:{}},
    {id:'dg2', ad:'Elektrik / Fatura',  aylar:{}},
    {id:'dg3', ad:'Doğalgaz / Fatura',  aylar:{}},
    {id:'dg4', ad:'İnternet / Fatura',  aylar:{}},
    {id:'dg5', ad:'Telefon SIM',        aylar:{}},
    {id:'dg6', ad:'Bina Aidatı',        aylar:{}},
  ],
  // Kart taksit/abonelik harcamaları — {id, kartId, ad, kategori, taksitSayisi, aylikTutar, baslangic}
  kartTaksitler: [],
  // Günlük işlemler
  txns: [],
};

function sv(){window._fbSave&&window._fbSave();}
const fmt=v=>{const a=Math.abs(Math.round(v));return(v<0?'-':'')+'₺'+a.toLocaleString('tr-TR');};
const fmtRaw=v=>Math.abs(Math.round(v)).toLocaleString('tr-TR');
const today=()=>new Date().toISOString().slice(0,10);

/* ── AY NAVİGASYON ── */
function prevMonth(){
  const [y,m]=S.currentMonth.split('-').map(Number);
  let ny=y,nm=m-1;if(nm<1){nm=12;ny--;}
  S.currentMonth=`${ny}-${String(nm).padStart(2,'0')}`;sv();renderAll();
}
function nextMonth(){
  const [y,m]=S.currentMonth.split('-').map(Number);
  let ny=y,nm=m+1;if(nm>12){nm=1;ny++;}
  S.currentMonth=`${ny}-${String(nm).padStart(2,'0')}`;sv();renderAll();
}
function monthLabel(m){const [y,mo]=m.split('-').map(Number);return`${MN[mo-1]} ${y}`;}

/* ── HESAPLAMA ── */
function duzenliGiderToplam(m){
  return (S.duzenliGiderler||[]).reduce((s,dg)=>s+(parseFloat(dg.aylar&&dg.aylar[m]||0)),0);
}
function kartHarcamaToplamByKart(kartId,m){
  // Kart taksit harcamaları
  const taksit=(S.kartTaksitler||[]).filter(kt=>kt.kartId===kartId&&recDueKt(kt,m)).reduce((s,kt)=>s+kt.aylikTutar,0);
  // Günlük işlemler
  const gunluk=(S.txns||[]).filter(t=>t.tip==='r'&&t.kart===kartId&&t.tarih.startsWith(m)).reduce((s,t)=>s+t.tutar,0);
  return taksit+gunluk;
}
function recDueKt(kt,m){
  if(!kt.baslangic)return false;
  const start=kt.baslangic;const end=addMonths(start,kt.taksitSayisi-1);
  return m>=start&&m<=end;
}
function addMonths(ym,n){
  let [y,m]=ym.split('-').map(Number);m+=n;while(m>12){m-=12;y++;}return`${y}-${String(m).padStart(2,'0')}`;
}
function anaTablo_hesapla(kalem,m){
  // Hesaplanan Tutar = Limit * (1 + Oran/100)
  // Ana Gelir için: düzenli gider toplamı düşülür
  const base=parseFloat(kalem.limit||0);
  const oran=parseFloat(kalem.oran||0);
  let hesap=base*(1+oran/100);
  if(kalem.id==='at1'){
    // Ana Gelir'den düzenli gider toplamı düşülür
    hesap-=duzenliGiderToplam(m);
  }
  return hesap;
}
function toplamGelir(m){
  return (S.anaTablo||[]).filter(k=>k.tip==='gelir').reduce((s,k)=>s+anaTablo_hesapla(k,m),0);
}
function toplamGider(m){
  return (S.anaTablo||[]).filter(k=>k.tip==='gider').reduce((s,k)=>s+anaTablo_hesapla(k,m),0);
}
function kalanBakiye(m){return toplamGelir(m)-toplamGider(m);}
function devirBakiye(m){return parseFloat((S.devirler||{})[m]||0);}

/* ── SAYFA 1: ANA TABLO ── */
function renderP1(){
  const m=S.currentMonth;
  const [y,mo]=m.split('-').map(Number);
  let html=`<div class="month-nav">
    <button onclick="prevMonth()">‹</button>
    <div class="month-name">${MN[mo-1]} ${y}</div>
    <button onclick="nextMonth()">›</button>
  </div>`;

  // Özet kartlar
  const tG=toplamGelir(m),tGi=toplamGider(m),kb=kalanBakiye(m),db=devirBakiye(m);
  html+=`<div class="toplam-bar">
    <div class="t-card" style="border-left:2px solid var(--green)"><div class="t-lbl">Toplam Gelir</div><div class="t-val" style="color:var(--green2)">${fmt(tG)}</div></div>
    <div class="t-card" style="border-left:2px solid var(--red)"><div class="t-lbl">Toplam Gider</div><div class="t-val" style="color:var(--red2)">${fmt(tGi)}</div></div>
  </div>`;

  // Tablo başlıkları
  html+=`<div style="display:grid;grid-template-columns:1fr 80px 72px 1fr;gap:0;margin-bottom:4px;padding:0 4px">
    <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em">Kalem</div>
    <div style="font-size:10px;color:var(--t3);text-align:right;text-transform:uppercase;letter-spacing:.08em">Limit</div>
    <div style="font-size:10px;color:var(--t3);text-align:right;text-transform:uppercase;letter-spacing:.08em">Oran %</div>
    <div style="font-size:10px;color:var(--t3);text-align:right;text-transform:uppercase;letter-spacing:.08em">Hesaplanan</div>
  </div>`;

  // Gelir kalemleri
  html+=`<div class="section-label">Gelirler</div>`;
  (S.anaTablo||[]).filter(k=>k.tip==='gelir').forEach((k,i)=>{
    const idx=(S.anaTablo||[]).indexOf(k);
    const hesap=anaTablo_hesapla(k,m);
    const dg=k.id==='at1'?duzenliGiderToplam(m):0;
    html+=`<div class="tablo-row">
      <div class="tr-cell"><div class="tr-label"><span class="dot gelir-dot"></span>${k.ad}</div>${k.id==='at1'&&dg>0?`<div class="tr-sub">Düzenli gider: -${fmt(dg)}</div>`:''}</div>
      <div class="tr-cell"><input class="tr-input" type="number" value="${k.limit}" onchange="S.anaTablo[${idx}].limit=parseFloat(this.value)||0;sv();renderP1()" title="Limit"></div>
      <div class="tr-cell"><input class="tr-input" type="number" value="${k.oran}" onchange="S.anaTablo[${idx}].oran=parseFloat(this.value)||0;sv();renderP1()" title="Oran %"></div>
      <div class="tr-cell"><div class="tr-val pos">${fmt(hesap)}</div></div>
    </div>`;
  });

  // Gider kalemleri
  html+=`<div class="section-label">Giderler</div>`;
  (S.anaTablo||[]).filter(k=>k.tip==='gider').forEach(k=>{
    const idx=(S.anaTablo||[]).indexOf(k);
    const hesap=anaTablo_hesapla(k,m);
    const kartId=k.id;
    const harcanan=kartHarcamaToplamByKart(kartId,m);
    const kalan=hesap-harcanan;
    html+=`<div class="tablo-row">
      <div class="tr-cell"><div class="tr-label"><span class="dot gider-dot"></span>${k.ad}</div><div class="tr-sub">Harcanan: ${fmt(harcanan)}</div></div>
      <div class="tr-cell"><input class="tr-input" type="number" value="${k.limit}" onchange="S.anaTablo[${idx}].limit=parseFloat(this.value)||0;sv();renderP1()" title="Limit"></div>
      <div class="tr-cell"><input class="tr-input" type="number" value="${k.oran}" onchange="S.anaTablo[${idx}].oran=parseFloat(this.value)||0;sv();renderP1()" title="Oran %"></div>
      <div class="tr-cell"><div class="tr-val ${kalan>=0?'pos':'neg'}">${fmt(kalan)}</div><div class="tr-sub" style="text-align:right;font-size:10px">Limit: ${fmt(hesap)}</div></div>
    </div>`;
  });

  // Alt özet
  html+=`<div class="ozet-kart" style="margin-top:12px">
    <div class="ozet-row"><span class="ozet-lbl">Kalan Bakiye</span><span class="ozet-val" style="color:${kb>=0?'var(--green2)':'var(--red2)'}">${fmt(kb)}</span></div>
    <div class="ozet-row" style="align-items:flex-start">
      <span class="ozet-lbl">Devirli Bakiye</span>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <input type="number" value="${db}" style="width:130px;text-align:right;padding:5px 8px;font-size:13px;font-family:var(--fm)" onchange="if(!S.devirler)S.devirler={};S.devirler['${m}']=parseFloat(this.value)||0;sv();renderP1()" placeholder="0">
      </div>
    </div>
    <div class="ozet-row" style="border-top:1px solid var(--border2);margin-top:4px">
      <span class="ozet-lbl" style="font-weight:700">Net Toplam</span>
      <span class="ozet-val" style="font-size:16px;color:${kb+db>=0?'var(--green2)':'var(--red2)'}">${fmt(kb+db)}</span>
    </div>
  </div>`;

  // Kalem ekle/düzenle bölümü
  html+=`<div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn-sm btn-amber-sm" onclick="addAnaTablo('gelir')">+ Gelir Kalemi</button>
    <button class="btn-sm btn-amber-sm" onclick="addAnaTablo('gider')">+ Gider Kalemi</button>
    <button class="btn-sm" onclick="doLogout()" style="margin-left:auto;color:var(--t3)">Çıkış</button>
  </div>`;

  document.getElementById('pg1').innerHTML=html;
}

function addAnaTablo(tip){
  const ad=prompt(`${tip==='gelir'?'Gelir':'Gider'} kalem adı:`);if(!ad)return;
  const limit=parseFloat(prompt('Limit (₺):',10000)||10000);
  if(!S.anaTablo)S.anaTablo=[];
  S.anaTablo.push({id:'at'+Date.now(),ad,tip,limit,oran:0});
  sv();renderP1();
}

/* ── SAYFA 2: DÜZENLİ GİDERLER ── */
function renderP2(){
  const m=S.currentMonth;
  // 12 ay göster: aktif ay ve sonraki 11 ay
  const months=[];const[cy,cm]=m.split('-').map(Number);
  for(let i=0;i<12;i++){let y=cy,mo=cm+i;while(mo>12){mo-=12;y++;}months.push(`${y}-${String(mo).padStart(2,'0')}`);}
  const toplam=duzenliGiderToplam(m);

  let html=`<div class="page-head"><div class="page-title">Düzenli Giderler</div><button class="btn-sm btn-amber-sm" onclick="addDG()">+ Ekle</button></div>`;
  html+=`<div style="background:var(--bg2);border:1px solid var(--amber);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Bu Ay Toplam</div><div style="font-family:var(--fm);font-size:20px;font-weight:700;color:var(--amber)">${fmt(toplam)}</div></div>
    <div style="font-size:12px;color:var(--t2)">Ana Gelir'den<br>otomatik düşülür</div>
  </div>`;

  // Scrollable ay tablosu
  html+=`<div style="overflow-x:auto;margin-bottom:12px"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:${months.length*100+160}px">
  <thead><tr>
    <th style="text-align:left;padding:8px 10px;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--bg3);position:sticky;left:0;min-width:140px">Kalem</th>`;
  months.forEach(mo=>{const[,moi]=mo.split('-').map(Number);const ic=mo===m;html+=`<th style="text-align:right;padding:8px 10px;font-size:10px;${ic?'color:var(--amber);background:rgba(245,166,35,0.06)':'color:var(--t3)'};border-bottom:1px solid var(--border);min-width:100px">${MN[moi-1]}${ic?' ★':''}</th>`;});
  html+=`</tr></thead><tbody>`;

  (S.duzenliGiderler||[]).forEach((dg,i)=>{
    html+=`<tr>
      <td style="padding:8px 10px;border-bottom:1px solid var(--border);font-weight:600;background:var(--bg2);position:sticky;left:0">
        ${dg.ad}
        <button onclick="delDG('${dg.id}')" style="background:none;border:none;color:var(--t3);cursor:pointer;margin-left:6px;font-size:11px">×</button>
      </td>`;
    months.forEach(mo=>{
      const ic=mo===m;
      const val=(dg.aylar&&dg.aylar[mo])||'';
      html+=`<td style="padding:4px 6px;border-bottom:1px solid var(--border);${ic?'background:rgba(245,166,35,0.04)':''}">
        <input type="number" value="${val}" placeholder="—" style="width:90px;text-align:right;padding:5px 8px;font-size:12px;font-family:var(--fm);${ic?'border-color:rgba(245,166,35,0.4)':''}"
          onchange="if(!S.duzenliGiderler[${i}].aylar)S.duzenliGiderler[${i}].aylar={};S.duzenliGiderler[${i}].aylar['${mo}']=parseFloat(this.value)||0;sv();renderP1();renderP2()">
      </td>`;
    });
    html+=`</tr>`;
  });

  // Toplam satırı
  html+=`<tr style="background:var(--bg3)"><td style="padding:8px 10px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);background:var(--bg3);position:sticky;left:0">Toplam</td>`;
  months.forEach(mo=>{
    const t=duzenliGiderToplam(mo);const ic=mo===m;
    html+=`<td style="padding:8px 10px;text-align:right;font-family:var(--fm);font-weight:700;${ic?'color:var(--amber);background:rgba(245,166,35,0.06)':'color:var(--text3)'}">${t>0?fmt(t):'—'}</td>`;
  });
  html+=`</tr></tbody></table></div>`;

  document.getElementById('pg2').innerHTML=html;
}

function addDG(){
  const ad=prompt('Kalem adı (örn: Su / Fatura):');if(!ad)return;
  if(!S.duzenliGiderler)S.duzenliGiderler=[];
  S.duzenliGiderler.push({id:'dg'+Date.now(),ad,aylar:{}});
  sv();renderP2();
}
function delDG(id){if(!confirm('Silinsin mi?'))return;S.duzenliGiderler=S.duzenliGiderler.filter(d=>d.id!==id);sv();renderP2();}

/* ── SAYFA 3: KARTLAR ── */
function renderP3(){
  const m=S.currentMonth;
  const giderKalemler=(S.anaTablo||[]).filter(k=>k.tip==='gider');
  const [y,mo]=m.split('-').map(Number);

  let html=`<div class="page-head"><div class="page-title">Kart Harcamaları</div><button class="btn-sm btn-amber-sm" onclick="addKartTaksit()">+ Taksit/Abo.</button></div>`;
  html+=`<div style="font-size:12px;color:var(--amber);margin-bottom:-6px;margin-top:-4px">${MN[mo-1]} ${y}</div>`;

  // Her gider kalemi için özet kart
  giderKalemler.forEach(k=>{
    const limit=anaTablo_hesapla(k,m);
    const taksitler=(S.kartTaksitler||[]).filter(kt=>kt.kartId===k.id&&recDueKt(kt,m));
    const taksitTop=taksitler.reduce((s,kt)=>s+kt.aylikTutar,0);
    const gunlukTop=(S.txns||[]).filter(t=>t.tip==='r'&&t.kart===k.id&&t.tarih.startsWith(m)).reduce((s,t)=>s+t.tutar,0);
    const harcanan=taksitTop+gunlukTop;
    const kalan=limit-harcanan;
    const pct=limit>0?Math.min(100,Math.round(harcanan/limit*100)):0;
    const cls=pct>90?'var(--red)':pct>70?'var(--amber)':'var(--green)';

    html+=`<div class="kart-ozet">
      <div class="kart-ozet-head">
        <div class="kart-ad">${k.ad}</div>
        <div class="kart-kalan" style="color:${kalan>=0?'var(--green2)':'var(--red2)'}">${fmt(kalan)}<span style="font-size:12px;color:var(--t2);font-weight:400"> kalan</span></div>
      </div>
      <div class="kart-pb"><div class="kart-pbf" style="width:${pct}%;background:${cls}"></div></div>
      <div class="kart-stats">
        <div class="kstat">Limit<span>${fmt(limit)}</span></div>
        <div class="kstat">Taksit/Abo.<span style="color:var(--red2)">${fmt(taksitTop)}</span></div>
        <div class="kstat">Günlük<span style="color:var(--red2)">${fmt(gunlukTop)}</span></div>
        <div class="kstat">Kullanım<span style="color:${pct>70?'var(--amber)':'var(--t2)'}">${pct}%</span></div>
      </div>`;

    // Bu karta ait taksitler
    if(taksitler.length){
      html+=`<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">`;
      taksitler.forEach(kt=>{
        const kalan_taksit=kt.taksitSayisi-monthDiff(kt.baslangic,m);
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-size:12px;font-weight:600">${kt.ad}</div><div style="font-size:10px;color:var(--t3)">${kt.kategori} · ${kalan_taksit} taksit kaldı</div></div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="font-family:var(--fm);font-size:13px;color:var(--red2)">${fmt(kt.aylikTutar)}/ay</div>
            <button onclick="delKT('${kt.id}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px">×</button>
          </div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  // Taksit genel listesi (devam eden)
  const devamEdenler=(S.kartTaksitler||[]).filter(kt=>{
    const end=addMonths(kt.baslangic,kt.taksitSayisi-1);
    return m<=end;
  });
  if(devamEdenler.length){
    html+=`<div class="divider-label"><span>Devam Eden Taksitler</span></div>`;
    devamEdenler.forEach(kt=>{
      const kart=giderKalemler.find(k=>k.id===kt.kartId);
      html+=`<div class="txn-row"><div class="txn-icon" style="background:var(--rBg)">📋</div><div class="txn-main"><div class="txn-name">${kt.ad}</div><div class="txn-sub">${kart?kart.ad:'?'} · ${kt.taksitSayisi} taksit · ${kt.baslangic}'den</div></div><div><div class="txn-amt" style="color:var(--red2)">${fmt(kt.aylikTutar)}/ay</div><div style="font-size:10px;color:var(--t3);text-align:right">${fmt(kt.aylikTutar*kt.taksitSayisi)} toplam</div></div></div>`;
    });
  }

  document.getElementById('pg3').innerHTML=html;
}

function monthDiff(start,end){
  const [sy,sm]=start.split('-').map(Number);
  const [ey,em]=end.split('-').map(Number);
  return(ey-sy)*12+(em-sm);
}

function addKartTaksit(){
  const giderKalemler=(S.anaTablo||[]).filter(k=>k.tip==='gider');
  const kartOpts=giderKalemler.map((k,i)=>`${i+1}. ${k.ad}`).join('\n');
  const idx=parseInt(prompt(`Hangi kart?\n${kartOpts}`))-1;
  if(isNaN(idx)||!giderKalemler[idx])return;
  const kartId=giderKalemler[idx].id;
  const ad=prompt('Harcama adı (örn: Ev Dolap):');if(!ad)return;
  const aylikTutar=parseFloat(prompt('Aylık taksit tutarı (₺):')||0);if(!aylikTutar)return;
  const taksitSayisi=parseInt(prompt('Taksit sayısı:',1)||1);
  const kategori=prompt('Kategori (örn: Ev - Elektronik):','Diğer')||'Diğer';
  const baslangic=prompt('Başlangıç ayı (YYYY-MM):',S.currentMonth)||S.currentMonth;
  if(!S.kartTaksitler)S.kartTaksitler=[];
  S.kartTaksitler.push({id:'kt'+Date.now(),kartId,ad,kategori,aylikTutar,taksitSayisi,baslangic});
  sv();renderP3();renderP1();
}
function delKT(id){if(!confirm('Silinsin mi?'))return;S.kartTaksitler=S.kartTaksitler.filter(k=>k.id!==id);sv();renderP3();renderP1();}

/* ── SAYFA 4: İŞLEMLER ── */
function renderP4(){
  const m=S.currentMonth;
  const giderKalemler=(S.anaTablo||[]).filter(k=>k.tip==='gider');
  const sorted=[...(S.txns||[])].sort((a,b)=>b.tarih.localeCompare(a.tarih));
  const fKart=document.getElementById('f4-kart')?.value||'';
  const fAy=document.getElementById('f4-ay')?.value||m;
  const fil=sorted.filter(t=>(!fKart||t.kart===fKart)&&t.tarih.startsWith(fAy));
  const months=[...new Set((S.txns||[]).map(t=>t.tarih.slice(0,7)))].sort().reverse();
  const kartOpts=giderKalemler.map(k=>`<option value="${k.id}">${k.ad}</option>`).join('');

  let html=`<div class="page-head"><div class="page-title">İşlemler</div></div>`;
  html+=`<div style="display:flex;gap:8px;margin-bottom:14px;overflow-x:auto">
    <select id="f4-kart" onchange="renderP4()" style="flex:1;padding:9px 12px;font-size:13px"><option value="">Tüm Kartlar</option>${kartOpts}</select>
    <select id="f4-ay" onchange="renderP4()" style="flex:1;padding:9px 12px;font-size:13px">${months.map(mm=>`<option value="${mm}"${mm===m?' selected':''}>${mm}</option>`).join('')}</select>
  </div>`;

  // Seçili aya özet
  const ayGider=fil.filter(t=>t.tip==='r').reduce((s,t)=>s+t.tutar,0);
  const ayGelir=fil.filter(t=>t.tip==='g').reduce((s,t)=>s+t.tutar,0);
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
    <div class="t-card" style="border-left:2px solid var(--green)"><div class="t-lbl">Gelir</div><div class="t-val" style="color:var(--green2)">${fmt(ayGelir)}</div></div>
    <div class="t-card" style="border-left:2px solid var(--red)"><div class="t-lbl">Gider</div><div class="t-val" style="color:var(--red2)">${fmt(ayGider)}</div></div>
  </div>`;

  if(!fil.length)html+=`<div class="empty">Bu ay kayıt yok.<br>+ butonuyla ekle.</div>`;
  fil.forEach(t=>{
    const kart=giderKalemler.find(k=>k.id===t.kart);
    const isGider=t.tip==='r';
    html+=`<div class="txn-row">
      <div class="txn-icon" style="background:${isGider?'var(--rBg)':'var(--gBg)'}">
        ${isGider?'💳':'💰'}
      </div>
      <div class="txn-main">
        <div class="txn-name">${t.kategori||'İşlem'}${t.not?' · '+t.not:''}</div>
        <div class="txn-sub">${t.tarih.slice(5)} · ${kart?kart.ad:'?'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="txn-amt" style="color:${isGider?'var(--red2)':'var(--green2)'}">${isGider?'-':'+'}${fmt(t.tutar)}</div>
        <button class="txn-del" onclick="delTxn(${t.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
      </div>
    </div>`;
  });

  html+=`<button onclick="expCSV()" style="margin-top:12px;width:100%;padding:12px;border-radius:var(--rs);border:1px solid var(--border2);background:none;color:var(--t2);font-family:var(--ff);font-size:13px;cursor:pointer">CSV İndir</button>`;
  document.getElementById('pg4').innerHTML=html;
}

function delTxn(id){
  S.txns=S.txns.filter(t=>t.id!==id);sv();renderP4();renderP1();renderP3();
}
function expCSV(){
  const h='Tarih,Tip,Kart,Kategori,Not,Tutar\n';
  const b=(S.txns||[]).sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(t=>{
    const kart=(S.anaTablo||[]).find(k=>k.id===t.kart);
    return`${t.tarih},${t.tip==='r'?'Gider':'Gelir'},"${kart?kart.ad:'?'}","${t.kategori||''}","${t.not||''}",${t.tutar}`;
  }).join('\n');
  const blob=new Blob(['\ufeff'+h+b],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const el=document.createElement('a');el.href=url;el.download='islemler.csv';el.click();URL.revokeObjectURL(url);
}

/* ── QUICK MODAL ── */
let qTip='r';
function openQ(){
  document.getElementById('q-d').value=today();
  document.getElementById('q-t').value='';
  document.getElementById('q-n').value='';
  document.getElementById('q-msg').textContent='';
  fillQKart();fillQCat();
  document.getElementById('qmodal').classList.add('open');
  setTimeout(()=>document.getElementById('q-t').focus(),300);
}
function closeQ(e){if(e&&e.target!==document.getElementById('qmodal'))return;document.getElementById('qmodal').classList.remove('open');}
function setQT(t){
  qTip=t;
  document.getElementById('q-g').className='tsw'+(t==='g'?' g':'');
  document.getElementById('q-r').className='tsw'+(t==='r'?' r':'');
  fillQKart();fillQCat();
}
function fillQKart(){
  const giderKalemler=(S.anaTablo||[]).filter(k=>k.tip==='gider');
  document.getElementById('q-k').innerHTML=giderKalemler.map(k=>`<option value="${k.id}">${k.ad}</option>`).join('');
}
function fillQCat(){
  document.getElementById('q-c').innerHTML=(qTip==='g'?CATS_G:CATS_R).map(c=>`<option>${c}</option>`).join('');
}
function saveQ(){
  const tarih=document.getElementById('q-d').value;
  const tutar=parseFloat(document.getElementById('q-t').value||0);
  const kart=document.getElementById('q-k').value;
  const kategori=document.getElementById('q-c').value;
  const not=document.getElementById('q-n').value;
  if(!tarih||!tutar){document.getElementById('q-msg').textContent='Tarih ve tutar gerekli.';return;}
  if(!S.txns)S.txns=[];
  S.txns.push({id:Date.now(),tarih,tip:qTip,kart,kategori,not,tutar});
  sv();renderAll();
  document.getElementById('qmodal').classList.remove('open');
}

/* ── NAV ── */
function goTab(n,el){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('pg'+n).classList.add('on');
  el.classList.add('on');
  document.getElementById('scroll').scrollTop=0;
  if(n===1)renderP1();else if(n===2)renderP2();else if(n===3)renderP3();else renderP4();
}

function renderAll(){
  const active=document.querySelector('.pg.on');
  renderP1();
  if(active?.id==='pg2')renderP2();
  else if(active?.id==='pg3')renderP3();
  else if(active?.id==='pg4')renderP4();
}
</script>
</body>
</html>
