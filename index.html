<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#090909">
    <title>Dinamik Bütçe Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090909; --bg2: #131313; --bg3: #1c1c1c;
            --b: rgba(255,255,255,0.07); --b2: rgba(255,255,255,0.13);
            --t: #edeae4; --t2: #8a8480; --t3: #50504a;
            --R: #f04438; --R2: #ff7b72; --rBg: rgba(240,68,56,0.1);
            --G: #22c55e; --G2: #4ade80; --gBg: rgba(34,197,94,0.1);
            --A: #f5a623; --aBg: rgba(245,166,35,0.1);
            --B: #3b82f6; --ff: 'Barlow', sans-serif; --fm: 'IBM Plex Mono', monospace;
            --r: 12px; --rs: 8px; --tab: 60px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg); color: var(--t); font-family: var(--ff); overflow: hidden; }

        /* AUTH */
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 24px; }
        #auth.hide { display: none; }
        .abox { width: 100%; max-width: 360px; }
        .ah { font-size: 28px; font-weight: 700; margin-bottom: 20px; text-align: center;}
        .ig { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .ig label { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .09em; }
        input, select { background: var(--bg3); border: 1px solid var(--b2); border-radius: var(--rs); color: var(--t); font-size: 15px; padding: 12px; width: 100%; outline: none; }
        input:focus { border-color: var(--A); }
        .bf { width: 100%; padding: 14px; border-radius: var(--rs); border: none; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .bf.pri { background: var(--A); color: #000; }
        .bf.sec { background: transparent; border: 1px solid var(--b2); color: var(--t); }

        /* APP LAYOUT */
        #app { display: none; flex-direction: column; height: 100vh; max-width: 700px; margin: 0 auto; }
        #app.show { display: flex; }
        #scr { flex: 1; overflow-y: auto; padding: 15px 15px 120px; scrollbar-width: none; }
        #scr::-webkit-scrollbar { display: none; }
        #sd { position: fixed; top: 10px; right: 10px; width: 8px; height: 8px; border-radius: 50%; background: var(--t3); z-index: 100; }
        #sd.ok { background: var(--G); }
        #sd.sy { background: var(--A); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* TABS */
        #tbar { height: var(--tab); background: rgba(9,9,9,0.95); border-top: 1px solid var(--b); display: flex; backdrop-filter: blur(10px); flex-shrink: 0; }
        .tb { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: none; background: none; color: var(--t3); font-weight: 700; font-size: 9px; text-transform: uppercase; cursor: pointer; }
        .tb.on { color: var(--A); }
        .tb svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* ANA TABLO & GRID */
        .pg { display: none; } .pg.on { display: block; }
        .mnav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .mname { font-family: var(--fm); font-weight: 700; color: var(--A); font-size: 18px; }
        .mnav button { background: var(--bg3); border: none; color: var(--t); padding: 8px 16px; border-radius: var(--rs); cursor: pointer; }
        
        .at-hdr { display: grid; grid-template-columns: 1fr 80px 60px 90px; padding: 0 10px 5px; font-size: 10px; color: var(--t3); text-transform: uppercase; }
        .at-row { background: var(--bg2); border: 1px solid var(--b); border-radius: var(--r); margin-bottom: 5px; overflow: hidden; }
        .at-grid { display: grid; grid-template-columns: 1fr 80px 60px 90px; align-items: center; }
        .at-cell { padding: 10px; border-right: 1px solid var(--b); display: flex; align-items: center; height: 44px; }
        .at-cell:last-child { border-right: none; justify-content: flex-end; }
        .ni { background: transparent; border: none; text-align: right; width: 100%; color: var(--t); font-family: var(--fm); font-size: 13px; outline: none; }
        .av { font-family: var(--fm); font-weight: 700; font-size: 13px; }
        .pos { color: var(--G2); } .neg { color: var(--R2); }
        .sec-lbl { font-size: 10px; color: var(--t3); text-transform: uppercase; margin: 15px 0 8px 5px; letter-spacing: 1px; }

        /* DÜZENLİ TABLO (SCROLLABLE) */
        .dg-wrap { overflow-x: auto; margin: 0 -15px; padding: 0 15px; -webkit-overflow-scrolling: touch; }
        .dg-tbl { width: 100%; border-collapse: collapse; min-width: 600px; }
        .dg-tbl th { text-align: right; padding: 10px; font-size: 10px; color: var(--t3); border-bottom: 1px solid var(--b); }
        .dg-tbl th:first-child { text-align: left; position: sticky; left: 0; background: var(--bg); z-index: 2; }
        .dg-tbl td { padding: 8px; border-bottom: 1px solid var(--b); text-align: right; }
        .dg-tbl td:first-child { text-align: left; position: sticky; left: 0; background: var(--bg2); z-index: 1; font-weight: 600; font-size: 13px; }

        /* TX ROW (İşlemler) */
        .txr { display: flex; align-items: center; justify-content: space-between; background: var(--bg2); padding: 12px; border-radius: var(--r); margin-bottom: 6px; border: 1px solid var(--b); }
        .txn { font-weight: 600; font-size: 14px; }
        .txs { font-size: 11px; color: var(--t3); margin-top: 2px; }
        .txdel { color: var(--R2); background: none; border: none; padding: 8px; cursor: pointer; font-size: 16px; }

        #fab { position: fixed; bottom: 85px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--A); border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.4); z-index: 99; }
        .empty { text-align: center; padding: 40px; color: var(--t3); font-size: 14px; }
    </style>
</head>
<body>

<div id="auth">
    <div class="abox">
        <div class="ah">Bütçe Giriş</div>
        <div class="ig"><label for="ae">E-Posta</label><input type="email" id="ae" autocomplete="email" placeholder="mail@adres.com"></div>
        <div class="ig"><label for="ap">Şifre</label><input type="password" id="ap" autocomplete="current-password" placeholder="••••••"></div>
        <button class="bf pri" onclick="doLogin()">Giriş Yap</button>
        <button class="bf sec" onclick="doReg()">Yeni Hesap</button>
        <div id="amsg" style="color:var(--R2); font-size:12px; text-align:center;"></div>
    </div>
</div>

<div id="sd"></div>

<div id="app">
    <div id="scr">
        <div id="p1" class="pg on"></div>
        <div id="p2" class="pg"></div>
        <div id="p3" class="pg"></div>
        <div id="p4" class="pg"></div>
        <div id="p5" class="pg"></div>
    </div>

    <button id="fab" onclick="openQ()">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 5v14M5 12h14" stroke="#000" stroke-width="3" stroke-linecap="round"/></svg>
    </button>

        <button class="tb" onclick="gT(2,this)"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg><span>Düzenli</span></button>
        <button class="tb" onclick="gT(3,this)"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>Kartlar</span></button>
